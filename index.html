<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎵 Patriot Music Empire - Command Station v2.0</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

<style>
:root {
  --bg0: #050505;
  --bg1: #0d0d0d;
  --bg2: #111;
  --bg3: #161616;
  --bg4: #1a1a1a;
  --green:     #00ff41;
  --green-dim: #00cc33;
  --green-dk:  #003311;
  --amber:     #ffb000;
  --amber-dk:  #1a0f00;
  --red:       #ff3333;
  --blue:      #00aaff;
  --purple:    #8b5cf6;
  --white:     #d0d0d0;
  --dim:       #444;
  --border:    #1e1e1e;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Orbitron', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg0);color:var(--green);font-family:var(--mono);display:flex;flex-direction:column;}

/* ── SCANLINE OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.012) 2px,rgba(0,255,65,.012) 4px);
  pointer-events:none;z-index:9999;
}

/* ════════════════════ LOGIN SCREEN ════════════════════ */
#login-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg0);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0;
}
#login-screen.hidden{display:none;}

.login-box{
  width:420px;
  background:var(--bg2);
  border:1px solid var(--green-dk);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 0 60px rgba(0,255,65,.05);
}
.login-header{
  background:var(--bg1);
  border-bottom:1px solid var(--green-dk);
  padding:24px;
  text-align:center;
}
.login-logo{
  font-family:var(--display);
  font-size:1.1rem;
  font-weight:900;
  letter-spacing:3px;
  margin-bottom:4px;
}
.login-logo span{color:var(--amber);}
.login-sub{font-size:.6rem;color:var(--dim);letter-spacing:2px;}

.login-body{padding:24px;display:flex;flex-direction:column;gap:14px;}

.l-label{font-size:.58rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;}

.l-input{
  width:100%;
  background:var(--bg4);
  border:1px solid var(--border);
  border-radius:4px;
  color:var(--white);
  font-family:var(--mono);
  font-size:.72rem;
  padding:10px 12px;
  outline:none;
  transition:border .2s;
}
.l-input:focus{border-color:var(--green);}

.l-btn{
  width:100%;
  padding:12px;
  background:var(--green-dk);
  border:1px solid var(--green);
  border-radius:4px;
  color:var(--green);
  font-family:var(--display);
  font-size:.7rem;
  font-weight:700;
  letter-spacing:2px;
  cursor:pointer;
  transition:all .2s;
  margin-top:4px;
}
.l-btn:hover{background:var(--green);color:#000;}

.l-divider{
  display:flex;align-items:center;gap:10px;
  font-size:.55rem;color:var(--dim);
}
.l-divider::before,.l-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

.l-google{
  width:100%;
  padding:10px;
  background:var(--bg4);
  border:1px solid var(--border);
  border-radius:4px;
  color:var(--white);
  font-family:var(--mono);
  font-size:.68rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.l-google:hover{border-color:#4285f4;color:#4285f4;}
.l-google i{color:#4285f4;}

.login-footer{
  padding:12px 24px;
  background:var(--bg1);
  border-top:1px solid var(--border);
  font-size:.55rem;
  color:var(--dim);
  text-align:center;
}

/* ════════════════════ TOP BAR ════════════════════ */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg1);
  border-bottom:1px solid var(--green-dk);
  padding:0 14px;height:46px;flex-shrink:0;
}
.brand{font-family:var(--display);font-size:.9rem;font-weight:900;letter-spacing:2px;display:flex;align-items:center;gap:8px;}
.brand span{color:var(--amber);}
.brand-user{font-size:.58rem;color:var(--dim);font-family:var(--mono);margin-left:10px;}

.pills{display:flex;gap:6px;align-items:center;}
.pill{
  display:flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:3px;
  font-size:.58rem;font-family:var(--mono);
  border:1px solid;cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
.pill.idle   {border-color:var(--amber);color:var(--amber);background:var(--amber-dk);}
.pill.active {border-color:var(--green);color:var(--green);background:var(--green-dk);}
.pill.admin  {border-color:var(--amber);color:#000;background:var(--amber);font-weight:bold;}
.pill.online {border-color:var(--green);color:var(--green);background:var(--green-dk);}
.pill.user-pill{border-color:#4285f4;color:#4285f4;background:#001122;cursor:default;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ════════════════════ TICKER ════════════════════ */
#ticker{
  background:#000;border-bottom:1px solid var(--green-dk);
  height:24px;overflow:hidden;display:flex;align-items:center;flex-shrink:0;
}
#ticker-label{
  background:var(--green);color:#000;font-size:.58rem;font-weight:bold;
  padding:0 8px;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;
}
#ticker-track{display:flex;animation:ticker 50s linear infinite;white-space:nowrap;}
#ticker-track span{font-size:.6rem;color:var(--green);padding:0 20px;}
#ticker-track span.sep{color:var(--amber);}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* ════════════════════ MAIN GRID ════════════════════ */
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#main{display:grid;grid-template-columns:270px 1fr 250px;flex:1;overflow:hidden;}

/* ════════════════════ PANELS ════════════════════ */
.panel{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel:last-child{border-right:none;}
.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 11px;background:var(--bg1);
  border-bottom:1px solid var(--border);
  font-size:.6rem;letter-spacing:1px;color:var(--white);flex-shrink:0;
}
.ph .ico{color:var(--amber);margin-right:5px;}
.pb{flex:1;overflow-y:auto;padding:9px;scrollbar-width:thin;scrollbar-color:var(--green-dk) transparent;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--green-dk);border-radius:2px;}

/* ════════════════════ LEFT PANEL ════════════════════ */
.sec{font-size:.52rem;letter-spacing:2px;color:#444;text-transform:uppercase;margin:10px 0 5px;}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:3px;}
.pbtn{
  display:flex;align-items:center;gap:5px;
  padding:6px 7px;background:var(--bg4);
  border:1px solid var(--border);border-radius:3px;
  color:var(--white);font-size:.6rem;font-family:var(--mono);
  cursor:pointer;transition:all .2s;position:relative;
}
.pbtn:hover{border-color:var(--green);color:var(--green);background:var(--green-dk);}
.pbtn.on{border-color:var(--green);color:var(--green);}
.pbtn.on::after{content:'●';position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:.45rem;color:var(--green);}
.pbtn i{width:13px;text-align:center;}
.yt{color:#ff0000!important;}.ig{color:#e1306c!important;}.tt{color:#69c9d0!important;}
.fb{color:#1877f2!important;}.tw{color:#1da1f2!important;}.sp{color:#1db954!important;}
.sc{color:#ff5500!important;}.pt{color:#e60023!important;}.etsy{color:#f56400!important;}
.dk{color:var(--purple)!important;}

/* API Keys section */
.key-group{background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:6px;}
.key-title{font-size:.55rem;color:var(--amber);letter-spacing:1px;margin-bottom:6px;}
.key-row{display:flex;gap:4px;margin-bottom:4px;}
.ki{
  flex:1;background:var(--bg0);border:1px solid var(--border);
  border-radius:3px;color:var(--green);font-family:var(--mono);
  font-size:.62rem;padding:5px 7px;outline:none;
}
.ki:focus{border-color:var(--green);}
.ks-btn{
  background:var(--green-dk);border:1px solid var(--green);
  color:var(--green);font-family:var(--mono);font-size:.58rem;
  padding:5px 8px;border-radius:3px;cursor:pointer;white-space:nowrap;
  transition:all .2s;
}
.ks-btn:hover{background:var(--green
